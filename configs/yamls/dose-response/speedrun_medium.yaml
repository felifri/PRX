# Dose-response speedrun config for PRX-Medium (~3.8B, pixel-space)
# Scaling experiment: medium model isolating parameter count while keeping pixel-space
#
# Key differences from small pixel-space speedrun:
#   - Pipeline: prx_jit_32_medium (~3.8B, same pixel-space setup as small)
#   - Reduced batch sizes for ~3x larger model
#   - TREAD/REPA indices adjusted for depth=24
#
# Usage:
#   composer train.py --config-path configs/yamls/dose-response --config-name speedrun_medium \
#     dataset@dataset.train_dataset=train_dose_c0

defaults:
  - /pipeline: prx_jit_32_medium
  - /optimizer: muon
  - /dataset@dataset.train_dataset: train_dose_c0
  - /dataset@dataset.eval_dataset: eval_unsplash
  - /prompts@callbacks.image_monitor.prompt: eval_prompts
  - _self_

hydra:
  job:
    env_set:
      FSDP_VERSION: "2"

project: PRX
group: dose-response-medium
name: C0
nccl_sleep: 1

activation_memory_budget: 1
image_size: 1024
patch_size_pixels: 32
global_batch_size: 512
device_train_microbatch_size: 8
device_eval_microbatch_size: 8
seed: 42
eval_first: false
compile_denoiser: true
compile_vae: true

algorithms:
  gradient_clipping:
    _target_: composer.algorithms.GradientClipping
    clipping_type: "norm"
    clipping_threshold: 0.2
  tread:
    _target_: prx.algorithm.tread.Tread
    route_start: 3
    route_end: 18
    routing_probability: 0.5
    detach: false
    seed: 42
    train_only: true
    self_guidance: true
  repa:
    _target_: prx.algorithm.repa.REPA
    lambda_weight: 0.5
    layer_index: 11
    encoder: "dinov3_vitl16"
    compile_encoder: true
  lpips:
    _target_: prx.algorithm.lpips.LPIPS
    lpips_weight: 0.1
    lpips_net: vgg
    t_threshold: 1
    resize_factor: 0.5
  pdino:
    _target_: prx.algorithm.perceptual_dino.PerceptualDINO
    pdino_weight: 0.01
    encoder: dinov2_vitb14_reg
    t_threshold: 1
    resize_resolution: 224
  ema:
    _target_: prx.algorithm.ema.EMA
    smoothing: 0.999
    update_interval: 10ba
    ema_start: 0ba

model:
  _target_: prx.pipeline.models_factory.build_pipeline
  denoiser_config: ${diffusion_model}
  text_tower_config: ${diffusion_text_tower}
  vae_config: ${diffusion_vae}
  scheduler_config: ${diffusion_scheduler}
  input_size: ${image_size}
  p_drop_caption: 0.1
  val_metrics:
    - _target_: torchmetrics.MeanSquaredError
  val_guidance_scales: []
  loss_bins:
    - [0.0, 0.3]
    - [0.3, 0.6]
    - [0.6, 1.0]

scheduler:
  _target_: composer.optim.MultiStepWithWarmupScheduler
  t_warmup: 1000ba
  milestones:
    - 1e9ep

logger:
  wandb:
    _target_: composer.loggers.WandBLogger
    project: ${project}
    group: ${group}
    name: ${name}

callbacks:
  speed_monitor:
    _target_: composer.callbacks.speed_monitor.SpeedMonitor
    window_size: 10
  lr_monitor:
    _target_: composer.callbacks.lr_monitor.LRMonitor
  memory_monitor:
    _target_: composer.callbacks.memory_monitor.MemoryMonitor
  runtime_estimator:
    _target_: composer.callbacks.runtime_estimator.RuntimeEstimator
  optimizer_monitor:
    _target_: composer.callbacks.OptimizerMonitor
  nan_monitor:
    _target_: composer.callbacks.NaNMonitor
  image_monitor:
    _target_: prx.callbacks.LogDiffusionImages
    size: ${image_size}
    guidance_scale: 3.5
    seed: 42
  generation_metrics:
    _target_: prx.callbacks.LogQualityMetrics
    frequency: 10_000ba
    guidance_scales: [3.5]
    seed: 42
    num_inference_steps: 50
    compute_fid: true
    compute_cmmd: true
    compute_dino_mmd: true
    max_samples: 10_000

trainer:
  _target_: composer.Trainer
  device: gpu
  max_duration: 100_000ba
  eval_interval: 10_000ba
  eval_subset_num_batches: 64
  device_train_microbatch_size: ${device_train_microbatch_size}
  run_name: ${group}-${name}
  seed: ${seed}
  scale_schedule_ratio: 1.0
  save_folder: /checkpoint/dream/felixfriedrich/diffusion_safety/dose_response/checkpoints_medium/${name}
  save_interval: 10_000ba
  save_num_checkpoints_to_keep: 1
  save_overwrite: true
  save_weights_only: true
  save_ignore_keys:
    - state/model/vae*
    - state/model/text_tower*
  autoresume: false
  precision: amp_bf16
  dist_timeout: 7200.
  parallelism_config:
    fsdp:
      reshard_after_forward: false
      device_mesh: mesh_2d
      use_orig_params: true
