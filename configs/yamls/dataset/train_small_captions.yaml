# @package dataset.train_dataset
# Small debug training dataset
# Same configuration as train_small but with moondream captions

_target_: prx.dataset.StreamingProcessedDataset
remote:
  # not applicable
local:
  - /mnt/data/datasets/gen_ai/t2i_1024_t5gemma2b/SYNTHETIC

caption_keys: caption_moondream
text_tower: ${diffusion_text_tower.preset_name}
cache_limit: 8tb
download_timeout: 7200
drop_last: true
shuffle: true
batching_method: device_per_stream
prefetch_factor: 2
num_workers: 8
persistent_workers: true
pin_memory: true
has_mask_text_latents: true
transforms:
  - _target_: prx.dataset.transforms.ArAwareResize
    default_image_size: ${image_size}
    patch_size_pixels: ${patch_size_pixels}
transforms_targets:
  - image
