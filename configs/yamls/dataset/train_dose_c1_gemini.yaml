# @package dataset.train_dataset
# Dose-response (gemini captions) C1: 5% unsafe, full scale
# safe_full (7.85M) + unsafe_c1 (397K oversampled) = ~8.24M total

_target_: prx.dataset.StreamingProcessedDataset
local:
  - /checkpoint/dream/felixfriedrich/diffusion_safety/dose_response/mds_gemini/safe_full
  - /checkpoint/dream/felixfriedrich/diffusion_safety/dose_response/mds_gemini/unsafe_c1

caption_keys:
  - [prompt, 1.]
text_tower: ${diffusion_text_tower.preset_name}
prompt_max_tokens: 256
cache_limit: 8tb
download_timeout: 7200
drop_last: true
shuffle: true
batching_method: device_per_stream
prefetch_factor: 2
num_workers: 8
persistent_workers: true
pin_memory: true
has_mask_text_latents: false
has_text_latents: false
transforms:
  - _target_: prx.dataset.transforms.ArAwareResize
    default_image_size: ${image_size}
    patch_size_pixels: ${patch_size_pixels}
transforms_targets:
  - image
