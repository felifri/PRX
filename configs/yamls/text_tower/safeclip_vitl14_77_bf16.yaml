# SafeCLIP ViT-L/14 Text Tower (77 max length, bf16)
# Safety-mitigated CLIP text encoder (NSFW concept removal)
preset_name: safeclip-vitl14-77-bf16
model_name: aimagelab/safeclip_vit-l_14
prompt_max_tokens: 77
use_attn_mask: true
use_last_hidden_state: true
only_tokenizer: false
torch_dtype: torch.bfloat16
unpadded: false
skip_text_cleaning: true
