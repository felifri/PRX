# Qwen3-VL-Embedding-2B Text Tower (256 max length, bf16)
# Embedding-tuned variant — bidirectional attention (not causal),
# better semantic representations than Instruct for conditioning.
# Text backbone only (vision encoder discarded after loading), hidden_size=2048
model_name: Qwen/Qwen3-VL-Embedding-2B
prompt_max_tokens: 256
use_attn_mask: true
use_last_hidden_state: true
torch_dtype: torch.bfloat16
skip_text_cleaning: true
