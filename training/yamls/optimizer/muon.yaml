# Muon optimizer: 2D weight matrices in blocks use Newton-Schulz
# orthogonalization, everything else falls back to Adam.
_target_: optimizer.create_muon_optimizer
_recursive_: false
muon_name_filter: blocks
muon_config:
  lr: 1.0e-4
  momentum: 0.95
  nesterov: true
  ns_steps: 5
  rms_scale: true
  weight_decay: 0.
adam_config:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.
